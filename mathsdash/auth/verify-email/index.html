<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — Maths Dash</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--primary:#8F4FEC;--primary-dark:#7340d4;--accent:#FED604;--text:#1a1a2e;--muted:#6b7280;--border:rgba(143,79,236,0.18);--error:#dc2626;--success:#16a34a;}
    body{font-family:'DM Sans',sans-serif;background:#f3f0ff;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}

    .card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:400px;text-align:center;box-shadow:0 8px 40px rgba(143,79,236,0.12);animation:fadeUp 0.5s ease forwards;}

    .brand-header{display:flex;flex-direction:column;align-items:center;margin-bottom:2rem;}
    .brand-icon{width:56px;height:56px;border-radius:16px;background:var(--primary);display:flex;align-items:center;justify-content:center;margin-bottom:0.75rem;box-shadow:0 4px 20px rgba(143,79,236,0.35);}
    .brand-icon svg{width:28px;height:28px;color:#fff;}
    .brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--text);letter-spacing:-0.02em;}
    .brand-name span{color:var(--primary);}

    .status-icon{font-size:3rem;margin-bottom:1rem;display:block;}
    h1{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:0.5rem;}
    p.sub{font-size:0.88rem;color:var(--muted);line-height:1.65;margin-bottom:1.25rem;}

    .spinner{width:36px;height:36px;border:3px solid rgba(143,79,236,0.2);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:1rem auto;}

    .accent-pill{display:inline-block;background:var(--accent);color:var(--text);font-weight:700;font-size:0.78rem;padding:0.2rem 0.75rem;border-radius:100px;margin-top:0.75rem;}

    .msg-box{padding:0.85rem 1rem;border-radius:10px;font-size:0.85rem;line-height:1.5;}
    .msg-box.error{background:#fef2f2;border:1px solid #fecaca;color:var(--error);}
    .msg-box.success{background:#f0fdf4;border:1px solid #bbf7d0;color:var(--success);}

    .back{display:block;text-align:center;margin-top:1.5rem;font-size:0.82rem;color:var(--muted);text-decoration:none;transition:color 0.2s;}
    .back:hover{color:var(--primary);}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>

  <div class="card">
    <div class="brand-header">
      <div class="brand-icon">
        <!-- Mail icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <div class="brand-name">Maths<span>Dash</span></div>
    </div>

    <!-- LOADING -->
    <div id="loading">
      <div class="spinner"></div>
      <p style="font-size:0.88rem;color:#6b7280;margin-top:0.5rem;">Verifying your email…</p>
    </div>

    <!-- RESULT (populated by JS) -->
    <div id="result" style="display:none;"></div>

    <a href="/mathsdash/" class="back">← Back to Maths Dash</a>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, applyActionCode } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBXig5xaA4d5jojKfSwHkvT8XCLJVQp2mo",
      authDomain: "mathsdash-29f85.firebaseapp.com",
      projectId: "mathsdash-29f85",
      storageBucket: "mathsdash-29f85.appspot.com",
      messagingSenderId: "1093007334795",
      appId: "1:1093007334795:ios:b5f13ba92f7d2c1116e38e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const oobCode = params.get('oobCode');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');

    function showResult(html) {
      loading.style.display = 'none';
      result.style.display = 'block';
      result.innerHTML = html;
    }

    async function verify() {
      if (!oobCode) {
        showResult(`
          <span class="status-icon">⚠️</span>
          <h1>Invalid Link</h1>
          <p class="sub">This email verification link is invalid. Please try again from the app.</p>
          <div class="msg-box error">No verification code found in this URL.</div>
        `);
        return;
      }

      try {
        await applyActionCode(auth, oobCode);
        showResult(`
          <span class="status-icon">✅</span>
          <h1>Email Verified!</h1>
          <p class="sub">Your email address has been successfully verified. You're all set to use Maths Dash.</p>
          <div class="accent-pill">Return to the app to continue</div>
        `);
      } catch (err) {
        const expired = err.code === 'auth/expired-action-code';
        showResult(`
          <span class="status-icon">${expired ? '⏱️' : '❌'}</span>
          <h1>${expired ? 'Link Expired' : 'Verification Failed'}</h1>
          <p class="sub">${expired
            ? 'This verification link has expired. Please sign in to the app and request a new verification email.'
            : 'This link has already been used or is invalid. Please sign in to the app to request a new one.'
          }</p>
          <div class="msg-box error">${err.message || 'An error occurred. Please try again.'}</div>
        `);
      }
    }

    verify();
  </script>

</body>
</html>
